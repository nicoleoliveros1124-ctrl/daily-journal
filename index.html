```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Daily Thoughts Journal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", sans-serif;
}

body{
    background: linear-gradient(135deg,#fef6f9,#f5f7ff);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:1100px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    display:grid;
    grid-template-columns:1fr 1.3fr;
}

.calendar-section{
    padding:25px;
    border-right:1px solid #eee;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.header button{
    border:none;
    background:#ff7aa2;
    color:white;
    width:40px;
    height:40px;
    border-radius:50%;
    cursor:pointer;
    font-size:18px;
}

.month-year{
    font-size:1.3rem;
    font-weight:bold;
    color:#444;
}

.days{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    text-align:center;
    margin-bottom:10px;
    font-weight:bold;
    color:#888;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
}

.day{
    height:50px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
}

.day:hover{
    background:#ffe0ea;
}

.selected{
    background:#ff7aa2;
    color:white;
}

.today{
    border:2px solid #ff7aa2;
}

.entry-section{
    padding:30px;
}

.entry-section h2{
    color:#444;
    margin-bottom:15px;
}

textarea{
    width:100%;
    height:350px;
    resize:none;
    border:none;
    outline:none;
    padding:15px;
    background:#fafafa;
    border-radius:15px;
    font-size:16px;
    line-height:1.7;
}

.save-btn{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    background:#ff7aa2;
    color:white;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

.save-btn:hover{
    opacity:.9;
}

.saved{
    margin-top:10px;
    color:green;
}

@media(max-width:850px){
    .container{
        grid-template-columns:1fr;
    }

    .calendar-section{
        border-right:none;
        border-bottom:1px solid #eee;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="calendar-section">

        <div class="header">
            <button id="prevMonth">&#10094;</button>
            <div class="month-year" id="monthYear"></div>
            <button id="nextMonth">&#10095;</button>
        </div>

        <div class="days">
            <div>Sun</div>
            <div>Mon</div>
            <div>Tue</div>
            <div>Wed</div>
            <div>Thu</div>
            <div>Fri</div>
            <div>Sat</div>
        </div>

        <div class="calendar" id="calendar"></div>

    </div>

    <div class="entry-section">
        <h2 id="selectedDate">Select a Date</h2>

        <textarea
        id="journalEntry"
        placeholder="Write your thoughts here..."></textarea>

        <button class="save-btn" onclick="saveEntry()">
            Save Entry
        </button>

        <div class="saved" id="savedMessage"></div>

    </div>

</div>

<script>

const calendar = document.getElementById("calendar");
const monthYear = document.getElementById("monthYear");
const selectedDateText = document.getElementById("selectedDate");
const journalEntry = document.getElementById("journalEntry");

let currentDate = new Date();
let selectedDate = null;

function renderCalendar(){

    calendar.innerHTML = "";

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month + 1, 0).getDate();

    monthYear.textContent =
        currentDate.toLocaleString("default", {
            month:"long",
            year:"numeric"
        });

    for(let i=0;i<firstDay;i++){
        const empty = document.createElement("div");
        calendar.appendChild(empty);
    }

    for(let day=1; day<=lastDate; day++){

        const dayDiv = document.createElement("div");
        dayDiv.classList.add("day");
        dayDiv.textContent = day;

        const today = new Date();

        if(
            day===today.getDate() &&
            month===today.getMonth() &&
            year===today.getFullYear()
        ){
            dayDiv.classList.add("today");
        }

        dayDiv.addEventListener("click", ()=>{

            document
            .querySelectorAll(".day")
            .forEach(d=>d.classList.remove("selected"));

            dayDiv.classList.add("selected");

            selectedDate =
            `${year}-${month+1}-${day}`;

            selectedDateText.textContent =
            new Date(year,month,day)
            .toDateString();

            journalEntry.value =
            localStorage.getItem(selectedDate) || "";
        });

        calendar.appendChild(dayDiv);
    }
}

function saveEntry(){

    if(!selectedDate){
        alert("Please select a date first.");
        return;
    }

    localStorage.setItem(
        selectedDate,
        journalEntry.value
    );

    document.getElementById("savedMessage")
    .textContent = "Entry saved successfully!";

    setTimeout(()=>{
        document.getElementById("savedMessage")
        .textContent = "";
    },2000);
}

document
.getElementById("prevMonth")
.addEventListener("click",()=>{

    currentDate.setMonth(
        currentDate.getMonth()-1
    );

    renderCalendar();
});

document
.getElementById("nextMonth")
.addEventListener("click",()=>{

    currentDate.setMonth(
        currentDate.getMonth()+1
    );

    renderCalendar();
});

renderCalendar();

</script>

</body>
</html>
